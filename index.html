<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Canadian Time Zone Dial</title>
  
  <!-- Critical: Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="bg-slate-950 overscroll-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons (Inline SVGs for portability) ---
    const SunIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    );

    const MoonIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    );

    const RotateCcwIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );

    // --- Data: Canadian Time Zones relative to ET ---
    const ZONES = [
      { id: 'PT', name: 'Pacific', city: 'Vancouver', offset: -180, color: '#f43f5e' },
      { id: 'MT', name: 'Mountain', city: 'Calgary', offset: -120, color: '#f97316' },
      { id: 'CT', name: 'Central', city: 'Winnipeg', offset: -60, color: '#eab308' },
      { id: 'ET', name: 'Eastern', city: 'Gatineau / Toronto', offset: 0, color: '#22c55e' },
      { id: 'AT', name: 'Atlantic', city: 'Halifax', offset: 60, color: '#0ea5e9' },
      { id: 'NT', name: 'Newfoundland', city: "St. John's", offset: 90, color: '#8b5cf6' }
    ];

    // --- Math Helpers ---
    const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
      const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
      return {
        x: Math.round((centerX + (radius * Math.cos(angleInRadians))) * 100) / 100,
        y: Math.round((centerY + (radius * Math.sin(angleInRadians))) * 100) / 100
      };
    };

    const describeArc = (x, y, radius, startAngle, endAngle) => {
      const start = polarToCartesian(x, y, radius, endAngle);
      const end = polarToCartesian(x, y, radius, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return [
        "M", start.x, start.y,
        "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y
      ].join(" ");
    };

    const formatTime = (totalMinutes) => {
      const normalized = ((Math.round(totalMinutes) % 1440) + 1440) % 1440;
      const hours24 = Math.floor(normalized / 60);
      const minutes = normalized % 60;
      const ampm = hours24 >= 12 ? 'PM' : 'AM';
      const hours12 = hours24 % 12 || 12;
      return { 
        timeString: `${hours12}:${minutes.toString().padStart(2, '0')}`, 
        ampm,
        isTomorrow: totalMinutes >= 1440,
        isYesterday: totalMinutes < 0
      };
    };

    const get24HourString = (totalMinutes) => {
      const normalized = ((Math.round(totalMinutes) % 1440) + 1440) % 1440;
      const h = Math.floor(normalized / 60);
      const m = normalized % 60;
      return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    };

    const getCurrentETMinutes = () => {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        hour: 'numeric',
        minute: 'numeric',
        hour12: false
      });
      const parts = formatter.formatToParts(now);
      const h = parseInt(parts.find(p => p.type === 'hour')?.value || 0, 10);
      const m = parseInt(parts.find(p => p.type === 'minute')?.value || 0, 10);
      return (h * 60) + m;
    };

    function App() {
      const [etMinutes, setEtMinutes] = useState(720);
      const [focusedZoneId, setFocusedZoneId] = useState('ET');
      const [isDragging, setIsDragging] = useState(false);
      const [isEditing, setIsEditing] = useState(false);
      const [editValue, setEditValue] = useState("");

      const svgRef = useRef(null);
      const lastAngleRef = useRef(null);

      useEffect(() => {
        setEtMinutes(getCurrentETMinutes());
      }, []);

      const getAngle = (e) => {
        if (!svgRef.current) return 0;
        const rect = svgRef.current.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        // Support both mouse and touch events
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = clientX - centerX;
        const y = clientY - centerY;
        let angle = Math.atan2(y, x) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        return angle;
      };

      const handlePointerDown = (e) => {
        setIsDragging(true);
        if (e.target.setPointerCapture && e.pointerId) {
          e.target.setPointerCapture(e.pointerId);
        }
        lastAngleRef.current = getAngle(e);
      };

      const handlePointerMove = (e) => {
        if (!isDragging || lastAngleRef.current === null) return;
        const currentAngle = getAngle(e);
        let delta = currentAngle - lastAngleRef.current;

        if (delta > 180) delta -= 360;
        if (delta < -180) delta += 360;

        const deltaMins = delta * 2;

        setEtMinutes(prev => {
          const next = prev + deltaMins;
          return ((next % 1440) + 1440) % 1440;
        });

        lastAngleRef.current = currentAngle;
      };

      const handlePointerUp = (e) => {
        setIsDragging(false);
        if (e.target.releasePointerCapture && e.pointerId) {
          e.target.releasePointerCapture(e.pointerId);
        }
        lastAngleRef.current = null;
      };

      const resetToNow = () => {
        setEtMinutes(getCurrentETMinutes());
        setFocusedZoneId('ET');
        setIsEditing(false);
      };

      const submitTime = (e) => {
        if (e) e.preventDefault();
        setIsEditing(false);
        if (!editValue) return;
        
        const [h, m] = editValue.split(':').map(Number);
        if (!isNaN(h) && !isNaN(m)) {
          const newLocalMinutes = (h * 60) + m;
          const zone = ZONES.find(z => z.id === focusedZoneId);
          
          let newEtMinutes = newLocalMinutes - zone.offset;
          newEtMinutes = ((Math.round(newEtMinutes) % 1440) + 1440) % 1440;
          setEtMinutes(newEtMinutes);
        }
      };

      const focusedZone = ZONES.find(z => z.id === focusedZoneId);
      const focusedLocalMinutes = etMinutes + focusedZone.offset;
      const focusedTime = formatTime(focusedLocalMinutes);
      const dialRotationAngle = (focusedLocalMinutes / 720) * 360;
      
      const normalizedLocalMins = ((Math.round(focusedLocalMinutes) % 1440) + 1440) % 1440;
      const isDaytime = normalizedLocalMins >= 360 && normalizedLocalMins < 1080;

      return (
        <div className="h-[100dvh] w-full bg-slate-950 text-slate-200 font-sans selection:bg-white/20 flex flex-col relative overflow-hidden">
          
          <div className="absolute top-[20%] left-[20%] w-[40vw] h-[40vw] bg-indigo-500/10 rounded-full blur-[100px] pointer-events-none" />
          <div className="absolute bottom-[20%] right-[20%] w-[40vw] h-[40vw] bg-rose-500/10 rounded-full blur-[100px] pointer-events-none" />

          <header className="shrink-0 w-full max-w-4xl mx-auto flex justify-between items-center p-4 sm:p-6 relative z-10">
            <div>
              <h1 className="text-lg sm:text-xl md:text-2xl font-light tracking-tight text-white">
                Canadian <span className="font-semibold">Time Zones</span>
              </h1>
              <p className="text-[10px] sm:text-xs text-slate-400 mt-1">Interactive 24-Hour Dial</p>
            </div>
            <button 
              onClick={resetToNow}
              className="flex items-center gap-1.5 sm:gap-2 px-3 py-1.5 sm:px-4 sm:py-2 bg-white/5 hover:bg-white/10 border border-white/10 backdrop-blur-xl rounded-full text-xs font-medium text-slate-300 transition-all active:scale-95"
            >
              <RotateCcwIcon size={14} className="w-3 h-3 sm:w-4 sm:h-4" />
              <span className="hidden sm:inline">Reset to Now</span>
            </button>
          </header>

          <main className="flex-1 min-h-0 w-full flex items-center justify-center relative z-10 px-2 sm:px-4">
            <svg 
              ref={svgRef}
              viewBox="0 0 340 340" 
              className="w-full h-full max-w-[45vh] max-h-[45vh] sm:max-w-[50vh] sm:max-h-[50vh] touch-none drop-shadow-2xl"
              onPointerDown={handlePointerDown}
              onPointerMove={handlePointerMove}
              onPointerUp={handlePointerUp}
              onPointerLeave={handlePointerUp}
              onTouchStart={handlePointerDown}
              onTouchMove={handlePointerMove}
              onTouchEnd={handlePointerUp}
              style={{ cursor: isDragging ? 'grabbing' : 'grab' }}
            >
              <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="4" result="blur" />
                  <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
              </defs>

              <circle cx="170" cy="170" r="160" fill="#0f172a" stroke="#1e293b" strokeWidth="1" />
              <circle cx="170" cy="170" r="115" fill="#020617" stroke="#1e293b" strokeWidth="2" />
              
              {Array.from({ length: 60 }).map((_, i) => {
                const angle = i * 6;
                const isMajor = i % 5 === 0;
                const startRadius = isMajor ? 104 : 110;
                const endRadius = 115;
                const start = polarToCartesian(170, 170, startRadius, angle);
                const end = polarToCartesian(170, 170, endRadius, angle);

                let textElement = null;
                if (isMajor) {
                  const hour = i === 0 ? 12 : i / 5;
                  const textPos = polarToCartesian(170, 170, 88, angle);
                  textElement = (
                    <text
                      x={textPos.x} y={textPos.y}
                      textAnchor="middle" dominantBaseline="central"
                      fill="#64748b"
                      fontSize="14"
                      fontWeight="700"
                      className="pointer-events-none select-none"
                    >
                      {hour}
                    </text>
                  );
                }

                return (
                  <g key={i}>
                    <line 
                      x1={start.x} y1={start.y} 
                      x2={end.x} y2={end.y} 
                      stroke={isMajor ? "#475569" : "#1e293b"} 
                      strokeWidth={isMajor ? "2" : "1.5"} 
                      strokeLinecap="round"
                    />
                    {textElement}
                  </g>
                );
              })}

              <g transform={`rotate(${dialRotationAngle}, 170, 170)`}>
                <path 
                  d={describeArc(170, 170, 140, (-180 / 720) * 360, (90 / 720) * 360)}
                  fill="none" 
                  stroke="#475569" 
                  strokeWidth="4" 
                  strokeOpacity="0.3"
                  strokeLinecap="round"
                />

                {ZONES.map((zone) => {
                  const zoneAngle = (zone.offset / 720) * 360;
                  const pos = polarToCartesian(170, 170, 140, zoneAngle);
                  const isFocused = zone.id === focusedZoneId;
                  
                  return (
                    <g key={zone.id} transform={`translate(${pos.x}, ${pos.y})`}>
                      <circle cx="0" cy="0" r={isFocused ? "18" : "12"} fill="transparent" />
                      {isFocused && (
                        <circle cx="0" cy="0" r="16" fill="none" stroke={zone.color} strokeWidth="2" opacity="0.5" />
                      )}
                      <circle 
                        cx="0" 
                        cy="0" 
                        r={isFocused ? "10" : "6"} 
                        fill={isFocused ? zone.color : "#64748b"} 
                        stroke={isFocused ? "#ffffff" : "none"} 
                        strokeWidth={isFocused ? "1" : "0"}
                        filter={isFocused ? "url(#glow)" : ""}
                        className="transition-all duration-300"
                      />
                      <g transform={`rotate(${-dialRotationAngle}, 0, 0)`}>
                        <text 
                          x={0} 
                          y={isFocused ? "-22" : "-14"} 
                          textAnchor="middle" 
                          fill={isFocused ? zone.color : "#64748b"} 
                          fontSize={isFocused ? "14" : "11"} 
                          fontWeight="700"
                          className="transition-all duration-300 pointer-events-none select-none drop-shadow-md"
                        >
                          {zone.id}
                        </text>
                      </g>
                    </g>
                  );
                })}
              </g>

              <foreignObject x="70" y="110" width="200" height="120">
                <div className="w-full h-full flex flex-col items-center justify-center pointer-events-none">
                  <span className="text-[#64748b] text-[11px] font-semibold tracking-[0.1em] uppercase mb-1">
                    {focusedZone.name}
                  </span>
                  
                  {isEditing ? (
                    <form 
                      onSubmit={submitTime} 
                      className="pointer-events-auto flex flex-col items-center"
                      onPointerDown={(e) => e.stopPropagation()}
                      onTouchStart={(e) => e.stopPropagation()}
                    >
                      <input 
                        type="time"
                        value={editValue}
                        onChange={e => setEditValue(e.target.value)}
                        onBlur={submitTime}
                        autoFocus
                        className="bg-transparent border-b-2 border-slate-700 focus:border-indigo-500 text-white text-[42px] font-light leading-none text-center outline-none w-36 [&::-webkit-calendar-picker-indicator]:opacity-50 [&::-webkit-calendar-picker-indicator]:cursor-pointer transition-colors"
                        style={{ colorScheme: 'dark' }}
                      />
                    </form>
                  ) : (
                    <div 
                      className="pointer-events-auto flex flex-col items-center cursor-pointer group"
                      onClick={() => {
                        setEditValue(get24HourString(focusedLocalMinutes));
                        setIsEditing(true);
                      }}
                      onPointerDown={(e) => e.stopPropagation()}
                      onTouchStart={(e) => e.stopPropagation()}
                      title="Click to edit time"
                    >
                      <span className="text-white text-[42px] font-light leading-none tracking-tight group-hover:text-indigo-400 transition-colors drop-shadow-md">
                        {focusedTime.timeString}
                      </span>
                      <div className="flex items-center gap-1.5 mt-2 drop-shadow-md">
                        <span className="text-[#94a3b8] text-[14px] font-semibold tracking-widest">
                          {focusedTime.ampm}
                        </span>
                        {isDaytime ? (
                          <SunIcon size={14} className="text-amber-400" />
                        ) : (
                          <MoonIcon size={14} className="text-indigo-400" />
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </foreignObject>
            </svg>
          </main>

          <footer className="shrink-0 w-full max-w-5xl mx-auto z-10 p-3 pb-6 sm:p-4 sm:pb-8">
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 sm:gap-3">
              {ZONES.map((zone) => {
                const localMins = etMinutes + zone.offset;
                const { timeString, ampm, isTomorrow, isYesterday } = formatTime(localMins);
                const isFocused = zone.id === focusedZoneId;

                return (
                  <button
                    key={zone.id}
                    onClick={() => setFocusedZoneId(zone.id)}
                    className={`relative flex flex-col items-center justify-center p-2 sm:p-3 rounded-2xl sm:rounded-3xl border backdrop-blur-xl transition-all duration-300 overflow-hidden ${
                      isFocused 
                        ? 'bg-white/10 shadow-[0_0_20px_rgba(0,0,0,0.5)] scale-105 z-20 border-white/20' 
                        : 'bg-white/5 border-white/5 hover:bg-white/10 active:scale-95'
                    }`}
                  >
                    {isFocused && (
                      <div 
                        className="absolute top-0 left-0 w-full h-1" 
                        style={{ backgroundColor: zone.color }} 
                      />
                    )}
                    
                    <div className="flex w-full justify-between items-center mb-1">
                      <span className="text-[10px] sm:text-xs font-bold" style={{ color: isFocused ? zone.color : '#64748b' }}>
                        {zone.id}
                      </span>
                      {(isTomorrow || isYesterday) && (
                        <span className="text-[8px] sm:text-[9px] font-bold px-1.5 py-0.5 bg-white/10 text-slate-300 rounded-full">
                          {isTomorrow ? '+1d' : '-1d'}
                        </span>
                      )}
                    </div>

                    <div className="flex items-baseline gap-1 my-1">
                      <span className={`text-xl sm:text-2xl font-light tracking-tight ${isFocused ? 'text-white' : 'text-slate-300'}`}>
                        {timeString}
                      </span>
                      <span className={`text-[9px] sm:text-[10px] font-medium ${isFocused ? 'text-blue-400' : 'text-slate-500'}`}>
                        {ampm}
                      </span>
                    </div>

                    <span className="text-[9px] sm:text-[10px] text-slate-400 mt-1 font-medium w-full truncate text-center">
                      {zone.city}
                    </span>
                  </button>
                );
              })}
            </div>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
